<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Lettering Studio - Gestão de Estoque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Golos Text', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
        }
        canvas {
            background-color: transparent;
        }
        .control-panel {
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
        }
        select, input {
            background-color: #000000;
            border: 1px solid #222;
            color: white;
            transition: all 0.2s;
        }
        select:focus {
            border-color: #555;
            outline: none;
        }
        .btn-record {
            background-color: #ffffff;
            color: #000000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-record:disabled {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
        }
        .bg-chroma {
            background-color: #00ff00 !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-6xl flex flex-col gap-8">
        <!-- Área Principal do Canvas -->
        <div id="canvasContainer" class="relative w-full aspect-video flex items-center justify-center rounded-lg overflow-hidden border border-white/5 bg-black">
            <canvas id="previewCanvas" width="1920" height="1080" class="w-full h-full object-contain"></canvas>
            
            <div class="absolute top-6 left-6 text-[10px] tracking-[0.4em] text-white/20 uppercase pointer-events-none">
                Estoque Mode • 1080p • 60fps
            </div>

            <button id="replayBtn" class="absolute bottom-6 right-6 p-2 rounded-full bg-white/5 hover:bg-white/10 text-white/40 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </div>

        <!-- Controlos -->
        <div class="control-panel p-6 rounded-2xl flex flex-col md:flex-row items-end gap-6">
            <div class="flex-1 w-full">
                <label class="block text-[10px] tracking-[0.2em] text-white/40 uppercase mb-3">Frase (Gestão de Estoque)</label>
                <select id="letteringSelect" class="w-full p-4 rounded-xl text-sm font-medium">
                    <option value="+5000 sem endereçamento?">+5000 sem endereçamento?</option>
                    <option value="difícil de encontrar?">difícil de encontrar?</option>
                    <option value="o segredo: endereçamento">o segredo: endereçamento</option>
                    <option value="método alfanumérico">método alfanumérico</option>
                    <option value="usado pelas gigantes">usado pelas gigantes</option>
                    <option value="aprende em 20 minutos">aprende em 20 minutos</option>
                    <option value="pare de perder tempo!">pare de perder tempo!</option>
                    <option value="vendedor tem que vender">vendedor tem que vender</option>
                    <option value="bairros, ruas e prédios">bairros, ruas e prédios</option>
                    <option value="regra: mesma direção">regra: mesma direção</option>
                    <option value="já usa na sua loja?">já usa na sua loja?</option>
                    <option value="clique no link abaixo!">clique no link abaixo!</option>
                </select>
            </div>

            <div class="flex items-center gap-4 bg-black p-2 px-4 rounded-xl border border-white/5 h-[54px]">
                <input type="checkbox" id="greenScreenToggle" class="w-4 h-4 rounded-full accent-white">
                <label for="greenScreenToggle" class="text-[10px] tracking-widest text-white/60 uppercase cursor-pointer">Chroma Key</label>
            </div>

            <button id="recordBtn" class="btn-record relative h-[54px] px-8 rounded-xl font-bold text-[11px] tracking-[0.2em] uppercase flex items-center gap-3 overflow-hidden">
                <span id="recordStatus">Gravar MP4 (5s)</span>
                <div id="recordProgress" class="absolute bottom-0 left-0 h-[3px] bg-black/40 w-0 transition-all ease-linear"></div>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const letteringSelect = document.getElementById('letteringSelect');
        const greenScreenToggle = document.getElementById('greenScreenToggle');
        const recordBtn = document.getElementById('recordBtn');
        const replayBtn = document.getElementById('replayBtn');
        const recordProgress = document.getElementById('recordProgress');

        let animState = {
            startTime: performance.now(),
            active: true
        };

        let recording = false;
        let recorder = null;
        let chunks = [];

        const config = {
            fontBaseSize: 130,
            fontFamily: "'Golos Text', sans-serif",
            color: "#FFFFFF",
            maxWidth: canvas.width * 0.85
        };

        // Sistema de partículas para o alfabeto e números
        const particles = [];
        const alphabet = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";

        function createParticle(side) {
            const isLeft = side === 'left';
            return {
                x: isLeft ? Math.random() * (canvas.width * 0.2) : canvas.width * 0.8 + Math.random() * (canvas.width * 0.2),
                y: -50 - Math.random() * 500,
                speed: 1 + Math.random() * 3,
                value: isLeft ? alphabet[Math.floor(Math.random() * alphabet.length)] : numbers[Math.floor(Math.random() * numbers.length)],
                opacity: 0.05 + Math.random() * 0.15,
                fontSize: 16 + Math.random() * 24,
                side: side
            };
        }

        function initParticles() {
            for (let i = 0; i < 40; i++) {
                particles.push(createParticle('left'));
                particles.push(createParticle('right'));
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.y += p.speed;
                if (p.y > canvas.height + 50) {
                    const newP = createParticle(p.side);
                    p.y = newP.y;
                    p.x = newP.x;
                    p.value = newP.value;
                    p.opacity = newP.opacity;
                }
            });
        }

        function drawParticles() {
            ctx.save();
            ctx.font = `600 24px ${config.fontFamily}`;
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.font = `600 ${p.fontSize}px ${config.fontFamily}`;
                ctx.fillText(p.value, p.x, p.y);
            });
            ctx.restore();
        }

        function init() {
            initParticles();
            triggerAnimation();
            letteringSelect.addEventListener('change', triggerAnimation);
            replayBtn.addEventListener('click', triggerAnimation);
            greenScreenToggle.addEventListener('change', () => {
                container.classList.toggle('bg-chroma', greenScreenToggle.checked);
            });
            recordBtn.addEventListener('click', startRecording);
            requestAnimationFrame(render);
        }

        function triggerAnimation() {
            animState.startTime = performance.now();
        }

        function easeOutQuart(x) {
            return 1 - Math.pow(1 - x, 4);
        }

        function easeInQuart(x) {
            return x * x * x * x;
        }

        function render(timestamp) {
            const elapsed = timestamp - animState.startTime;
            const text = letteringSelect.value.toLowerCase();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (greenScreenToggle.checked) {
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Atualizar e desenhar partículas de fundo
            updateParticles();
            drawParticles();

            ctx.font = `600 ${config.fontBaseSize}px ${config.fontFamily}`;
            let metrics = ctx.measureText(text);
            let fontSize = config.fontBaseSize;
            
            if (metrics.width > config.maxWidth) {
                const ratio = config.maxWidth / metrics.width;
                fontSize = Math.floor(config.fontBaseSize * ratio);
                ctx.font = `600 ${fontSize}px ${config.fontFamily}`;
            }

            const entryDuration = 1200;
            const exitStart = 4300; 
            const exitDuration = 600;

            let sceneScale = 1;
            let sceneOpacity = 1;

            if (elapsed < entryDuration) {
                const p = elapsed / entryDuration;
                sceneScale = 0.96 + (0.04 * easeOutQuart(p));
                sceneOpacity = Math.min(p * 1.5, 1);
            } 
            else if (elapsed < exitStart) {
                sceneScale = 1 + Math.sin(timestamp / 2500) * 0.003;
            }
            else {
                const p = Math.min((elapsed - exitStart) / exitDuration, 1);
                sceneScale = 1 - (0.15 * easeInQuart(p));
                sceneOpacity = 1 - p;
            }

            if (sceneOpacity > 0) {
                drawLettering(text, canvas.width / 2, canvas.height / 2, sceneScale, sceneOpacity, elapsed, fontSize);
            }

            requestAnimationFrame(render);
        }

        function drawLettering(text, x, y, scale, opacity, elapsed, fontSize) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.globalAlpha = opacity;
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = config.color;

            const chars = text.split('');
            const totalWidth = ctx.measureText(text).width;
            let currentX = -totalWidth / 2;

            chars.forEach((char, i) => {
                const charWidth = ctx.measureText(char).width;
                const charCenter = currentX + charWidth / 2;
                
                const letterDelay = i * 30;
                const letterElapsed = Math.max(0, elapsed - letterDelay);
                const letterProgress = Math.min(letterElapsed / 800, 1);
                const ease = easeOutQuart(letterProgress);

                ctx.save();
                const yOffset = (1 - ease) * 15;
                ctx.translate(charCenter, yOffset);
                ctx.globalAlpha = opacity * letterProgress;
                ctx.fillText(char, 0, 0);
                ctx.restore();

                currentX += charWidth;
            });

            ctx.restore();
        }

        function startRecording() {
            if (recording) return;
            recording = true;
            chunks = [];
            
            const stream = canvas.captureStream(60);
            
            let mimeType = 'video/mp4;codecs=avc1';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm;codecs=vp9';
            }
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm';
            }

            try {
                recorder = new MediaRecorder(stream, { 
                    mimeType: mimeType,
                    videoBitsPerSecond: 8000000 
                });
            } catch (e) {
                recorder = new MediaRecorder(stream); 
            }

            recorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: recorder.mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `lettering-estoque-${Date.now()}.mp4`;
                a.click();
                
                setTimeout(() => URL.revokeObjectURL(url), 100);
                
                recording = false;
                recordBtn.disabled = false;
                recordProgress.style.width = "0%";
                document.getElementById('recordStatus').innerText = "Gravar MP4 (5s)";
            };

            triggerAnimation();
            recorder.start();
            
            recordBtn.disabled = true;
            document.getElementById('recordStatus').innerText = "A gravar...";
            recordProgress.style.transition = "width 5s linear";
            recordProgress.style.width = "100%";

            setTimeout(() => {
                if(recorder && recorder.state === 'recording') {
                    recorder.stop();
                }
            }, 5000);
        }

        window.onload = init;
    </script>
</body>
</html>
