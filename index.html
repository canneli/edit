<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Estética - Ad Premium 48s</title>
    
    <!-- Importar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importar Bibliotecas React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Importar Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050505] text-white m-0 p-0 overflow-hidden w-screen h-screen font-sans">

    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ÍCONES ---
        const IconBase = ({ children, size = 24, className = "", fill = "none", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
        const Pause = (props) => <IconBase {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></IconBase>;
        const Video = (props) => <IconBase {...props}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;
        const Upload = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>;
        const ImageIcon = (props) => <IconBase {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;
        const Sparkles = (props) => <IconBase {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></IconBase>;
        const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;
        const VolumeX = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></IconBase>;
        const Scissors = (props) => <IconBase {...props}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></IconBase>;
        const Music = (props) => <IconBase {...props}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>;

        // --- PALETA AC ESTÉTICA ---
        const AC_COLORS = { 
            gold: '#D4AF37', 
            bronze: '#CD7F32',
            dark: '#111111', 
            light: '#FAFAFA', 
            green: '#00FF00'
        };

        // --- SCRIPT DO AD (48 Segundos - BRONZE NA MÁQUINA) ---
        const subtitleData = [
          { id: 1, start: 0.0, end: 3.5, text: "Deseja um bronzeado perfeito" },
          { id: 2, start: 3.5, end: 7.0, text: "em qualquer estação do ano?" },
          { id: 3, start: 7.0, end: 11.0, text: "Conheça o Bronze na Máquina" },
          { id: 4, start: 11.0, end: 14.5, text: "exclusivo da AC Estética." },
          { id: 5, start: 14.5, end: 18.0, text: "Tecnologia de ponta com UV controlado," },
          { id: 6, start: 18.0, end: 22.0, text: "garantindo uma cor uniforme e duradoura." },
          { id: 7, start: 22.0, end: 26.0, text: "Esqueça os dias nublados e a falta de tempo." },
          { id: 8, start: 26.0, end: 30.0, text: "Sessões rápidas, seguras e relaxantes," },
          { id: 9, start: 30.0, end: 34.0, text: "para você sair com a marquinha dos sonhos." },
          { id: 10, start: 34.0, end: 38.5, text: "Pele dourada, estimulação de vitamina D," },
          { id: 11, start: 38.5, end: 42.5, text: "e um brilho radiante em minutos." },
          { id: 12, start: 42.5, end: 45.5, text: "Sinta-se confiante e poderosa." },
          { id: 13, start: 45.5, end: 48.0, text: "Agende sua sessão agora mesmo!" }
        ];

        const MAX_TIME = 48.0; // Tempo Máximo (48s)

        // Palavras destacadas em Dourado 3D (Atualizadas para Máquina)
        const highlightKeywords = [
            'perfeito', 'estação', 'ano', 'Máquina', 'AC', 'Estética', 'Tecnologia', 'UV', 'controlado', 
            'uniforme', 'duradoura', 'nublados', 'tempo', 'Sessões', 'rápidas', 'seguras', 'relaxantes', 
            'marquinha', 'sonhos', 'dourada', 'vitamina', 'D', 'brilho', 'radiante', 'minutos', 
            'confiante', 'poderosa', 'Agende', 'sessão'
        ];

        // MÚSICA E EFEITOS SONOROS (SFX)
        const MUSIC_URL = "https://cdn.pixabay.com/download/audio/2021/11/24/audio_3c316a8d61.mp3?filename=fashion-chill-beat-10515.mp3"; 
        const SFX_URL = "https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=whoosh-6316.mp3";

        function App() {
          const [isPlaying, setIsPlaying] = useState(false);
          const [isRecordingMode, setIsRecordingMode] = useState(false);
          const [activeSubtitle, setActiveSubtitle] = useState(null);
          const [bgMode, setBgMode] = useState('video');
          
          const [localVideos, setLocalVideos] = useState([]);
          const [currentVideoIndex, setCurrentVideoIndex] = useState(0);
          const [autoCutEnabled, setAutoCutEnabled] = useState(true);
          
          const [localLogoUrl, setLocalLogoUrl] = useState('');
          const [countdown, setCountdown] = useState(null);
          
          const [sfxEnabled, setSfxEnabled] = useState(true);
          const [musicEnabled, setMusicEnabled] = useState(true);
          
          const videoRef = useRef(null);
          const sfxRef = useRef(null);
          const bgmRef = useRef(null);
          const fileInputRef = useRef(null);
          const logoInputRef = useRef(null);
          
          const timeRef = useRef(0);
          const activeSubRef = useRef(null);
          const currentVideoIndexRef = useRef(0);
          const autoCutEnabledRef = useRef(true);
          
          const previewProgressBarRef = useRef(null);
          const hudTimeRef = useRef(null);

          // Sincronizar Refs de estado para o loop
          useEffect(() => { currentVideoIndexRef.current = currentVideoIndex; }, [currentVideoIndex]);
          useEffect(() => { autoCutEnabledRef.current = autoCutEnabled; }, [autoCutEnabled]);

          const getZoomLevel = (time) => {
            // Zoom in progressivo e suave durante os 48 segundos
            return 1.1 + (time / MAX_TIME) * 0.18; 
          };

          const playAllMedia = () => {
              if (bgMode === 'video' && videoRef.current && videoRef.current.networkState !== 3) {
                  videoRef.current.play().catch(e => console.warn("A reprodução foi bloqueada:", e));
              }
              if (musicEnabled && bgmRef.current) {
                  bgmRef.current.volume = 0.25; 
                  bgmRef.current.play().catch(e => console.warn("Música bloqueada:", e));
              }
          };

          const pauseAllMedia = () => {
              if (videoRef.current) videoRef.current.pause();
              if (bgmRef.current) bgmRef.current.pause();
          };

          useEffect(() => {
             if (isPlaying) {
                 if (videoRef.current) videoRef.current.currentTime = 0;
                 playAllMedia();
             }
          }, [currentVideoIndex]);

          const togglePlay = () => {
            if (!isPlaying) {
              playAllMedia();
              setIsPlaying(true);
            } else {
              pauseAllMedia();
              setIsPlaying(false);
            }
          };

          const resetTime = () => {
            timeRef.current = 0;
            if (videoRef.current && videoRef.current.readyState > 0) videoRef.current.currentTime = 0;
            if (bgmRef.current) bgmRef.current.currentTime = 0;
            
            if (previewProgressBarRef.current) previewProgressBarRef.current.style.width = '0%';
            if (hudTimeRef.current) hudTimeRef.current.innerText = '0.00s';
            
            setActiveSubtitle(null);
            activeSubRef.current = null;
            if (autoCutEnabled) setCurrentVideoIndex(0);
          };

          const handleVideoUpload = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
              const urls = files.map(file => URL.createObjectURL(file));
              setLocalVideos(urls);
              setCurrentVideoIndex(0);
              setBgMode('video');
              setAutoCutEnabled(files.length > 1);
              resetTime();
            }
          };

          const handleLogoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const url = URL.createObjectURL(file);
              setLocalLogoUrl(url);
            }
          };

          // LOOP DE ANIMAÇÃO 60 FPS
          useEffect(() => {
            let lastTime = performance.now();
            let frameId;

            const loop = (now) => {
              if (isPlaying && countdown === null) {
                let time = timeRef.current;
                
                const delta = (now - lastTime) / 1000;
                time = timeRef.current + delta;
                
                if (time >= MAX_TIME) { 
                    setIsPlaying(false); 
                    time = 0;
                    pauseAllMedia();
                }
                
                timeRef.current = time;

                // Lógica de Corte Automático distribuído pelos 48s
                if (localVideos.length > 1 && autoCutEnabledRef.current) {
                    const timePerVideo = MAX_TIME / localVideos.length;
                    const expectedIndex = Math.min(Math.floor(time / timePerVideo), localVideos.length - 1);
                    if (expectedIndex !== currentVideoIndexRef.current) {
                        currentVideoIndexRef.current = expectedIndex;
                        setCurrentVideoIndex(expectedIndex);
                    }
                }

                if (previewProgressBarRef.current) {
                    previewProgressBarRef.current.style.width = `${(time / MAX_TIME) * 100}%`;
                }
                if (hudTimeRef.current) {
                    hudTimeRef.current.innerText = `${time.toFixed(2)}s`;
                }
                if (videoRef.current && bgMode === 'video') {
                    videoRef.current.style.transform = `scale(${getZoomLevel(time)}) translateY(-2%)`;
                }

                const sub = subtitleData.find(s => time >= s.start && time <= s.end) || null;
                
                if (sub?.id !== activeSubRef.current?.id) {
                    activeSubRef.current = sub;
                    setActiveSubtitle(sub);
                    
                    if (sfxEnabled && sfxRef.current && sub !== null) {
                        sfxRef.current.currentTime = 0;
                        sfxRef.current.volume = 0.6; // Volume balanceado
                        sfxRef.current.play().catch(e => console.log("Áudio necessita interação."));
                    }
                }
              }
              lastTime = now;
              frameId = requestAnimationFrame(loop);
            };

            frameId = requestAnimationFrame(loop);
            return () => cancelAnimationFrame(frameId);
          }, [isPlaying, countdown, bgMode, sfxEnabled, musicEnabled, localVideos.length]);

          const startRecordingMode = () => {
            setIsRecordingMode(true);
            resetTime();
            setCountdown(5);
          };

          useEffect(() => {
            if (countdown === null) return;
            if (countdown > 0) {
              const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
              return () => clearTimeout(timer);
            } else if (countdown === 0) {
              setCountdown(null);
              setIsPlaying(true);
              playAllMedia();
            }
          }, [countdown]);

          const stopRecordingMode = () => {
            setIsRecordingMode(false);
            setIsPlaying(false);
            setCountdown(null);
            pauseAllMedia();
          };

          const currentLocalVideoUrl = localVideos.length > 0 ? localVideos[currentVideoIndex] : '';

          return (
            <div className="flex w-full h-screen bg-[#050505] text-white font-sans overflow-hidden">
              
              <audio ref={bgmRef} src={MUSIC_URL} preload="auto" loop crossOrigin="anonymous"></audio>
              <audio ref={sfxRef} src={SFX_URL} preload="auto" crossOrigin="anonymous"></audio>

              {/* NOVAS ANIMAÇÕES E ESTILOS - MAIS CHIQUE, UNIFORME E GLOWY */}
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

                /* Animação para palavras comuns: Elegante Fade com Desfoque suave */
                @keyframes elegantBlurReveal {
                  0% { transform: translateY(15px); opacity: 0; filter: blur(8px); }
                  100% { transform: translateY(0); opacity: 1; filter: blur(0px); }
                }

                .word-reveal-smooth { 
                  display: inline-block; 
                  opacity: 0; 
                  animation: elegantBlurReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
                }

                /* Animação para Letras Douradas: Entrada Sofisticada e Contida (Sem cortar) */
                @keyframes luxuriousSlam { 
                  0% { transform: scale(1.1) translateY(10px); opacity: 0; filter: blur(10px); letter-spacing: 4px; } 
                  100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); letter-spacing: 1px; } 
                }

                @keyframes elegantFloat {
                  0% { transform: translateY(0px); }
                  100% { transform: translateY(-3px); }
                }

                /* Glow Dourado Muito Mais Chic e Suave */
                @keyframes cinematicGlow {
                  0%, 100% { filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8)) drop-shadow(0px 0px 10px rgba(212,175,55,0.4)); }
                  50% { filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.9)) drop-shadow(0px 0px 25px rgba(212,175,55,0.85)); }
                }

                @keyframes goldShimmer {
                  0% { background-position: -200% center; }
                  100% { background-position: 200% center; }
                }

                .letter-anim {
                  display: inline-block;
                  opacity: 0;
                  animation: 
                    luxuriousSlam 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
                    elegantFloat 3s ease-in-out infinite alternate,
                    cinematicGlow 4s ease-in-out infinite alternate;
                }

                /* Pílula para texto normal: Fonte Montserrat super uniforme e limpa */
                .text-ig-pill {
                  font-family: 'Montserrat', sans-serif;
                  font-weight: 400;
                  background: linear-gradient(135deg, rgba(15,15,15,0.85) 0%, rgba(0,0,0,0.7) 100%);
                  padding: 4px 16px;
                  border-radius: 20px;
                  color: #FAFAFA;
                  line-height: 1.2;
                  box-shadow: 0 4px 15px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
                  border: 1px solid rgba(255,255,255,0.06);
                  backdrop-filter: blur(6px);
                }

                /* Texto Dourado 3D: Fonte Cinzel refinada */
                .text-3d-gold { 
                  font-family: 'Cinzel', serif;
                  font-weight: 600;
                  text-transform: uppercase;
                  background: linear-gradient(to right, #D4AF37 0%, #FFF8DC 50%, #D4AF37 100%);
                  background-size: 200% auto;
                  -webkit-background-clip: text;
                  -webkit-text-fill-color: transparent;
                  -webkit-text-stroke: 0.3px rgba(255,255,255,0.2);
                  transform-origin: bottom center;
                  animation-name: luxuriousSlam, elegantFloat, goldShimmer;
                  animation-duration: 0.8s, 3s, 5s;
                  animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1), ease-in-out, linear;
                  animation-iteration-count: 1, infinite, infinite;
                  animation-direction: normal, alternate, normal;
                  animation-fill-mode: forwards, forwards, forwards;
                }

                .color-graded-video-ac { 
                  filter: sepia(0.15) saturate(1.25) contrast(1.1) brightness(1.05) hue-rotate(-1deg); 
                }

                /* Sistema de Partículas Aprimorado (Efeito Bokeh Dourado) */
                @keyframes floatUpFade {
                  0% { transform: translateY(20px) scale(0.5); opacity: 0; }
                  20% { opacity: 0.8; transform: translateY(0px) scale(1); }
                  80% { opacity: 0.5; }
                  100% { transform: translateY(-120px) scale(1.5) rotate(45deg); opacity: 0; }
                }

                .gold-dust {
                  position: absolute;
                  background: radial-gradient(circle, #FFF8DC 0%, #D4AF37 50%, transparent 100%);
                  border-radius: 50%;
                  animation: floatUpFade 4s infinite ease-in-out;
                  mix-blend-mode: screen;
                }

                @keyframes pulseFlare {
                  0%, 100% { opacity: 0.15; transform: scale(1); }
                  50% { opacity: 0.35; transform: scale(1.1); }
                }
                .warm-flare { 
                  background: radial-gradient(circle at 70% 30%, rgba(212,175,55,0.25) 0%, rgba(0,0,0,0) 65%); 
                  animation: pulseFlare 6s infinite alternate ease-in-out; 
                  pointer-events: none; 
                }

                .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
                .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
                .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.4); border-radius: 10px; }
                .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(212,175,55,0.8); }
              `}</style>

              {/* PAINEL LATERAL DE CONTROLO */}
              {!isRecordingMode && (
                <div className="w-80 h-full border-r border-[#D4AF37]/20 bg-[#0a0a0a] p-6 flex flex-col gap-6 z-20 shadow-2xl shrink-0 overflow-y-auto custom-scrollbar relative">
                  <div className="absolute top-0 right-0 bg-[#D4AF37] text-black text-[9px] font-black px-3 py-1 rounded-bl-lg tracking-widest uppercase">
                    Versão 48s
                  </div>
                  
                  <div className="space-y-1 pb-4 border-b border-white/5 mt-2">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 bg-gradient-to-br from-[#D4AF37] to-[#CD7F32] rounded-full flex items-center justify-center font-bold text-black shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                        <Sparkles size={20} />
                      </div>
                      <div>
                        <h1 className="text-xl font-black tracking-tight" style={{fontFamily: "'Playfair Display', serif"}}>Ads Editor</h1>
                        <p className="text-[9px] text-[#D4AF37] font-bold uppercase tracking-[0.2em]">Alta Conversão Premium</p>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-3">
                    <button 
                      onClick={togglePlay}
                      className={`w-full py-4 rounded-xl font-black text-sm transition-all flex items-center justify-center gap-2 ${isPlaying ? 'bg-white text-black' : 'bg-gradient-to-r from-[#D4AF37] to-[#CD7F32] text-black shadow-lg shadow-[#D4AF37]/20 hover:scale-[1.02]'}`}
                    >
                      {isPlaying ? <Pause size={18} fill="currentColor" /> : <Play size={18} fill="currentColor" />}
                      {isPlaying ? 'PAUSAR PREVIEW' : 'INICIAR PREVIEW (48S)'}
                    </button>
                    <button 
                      onClick={resetTime}
                      className="w-full py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-semibold flex items-center justify-center gap-2 transition-colors"
                    >
                      <RefreshCw size={14} /> RESETAR TEMPO
                    </button>
                  </div>

                  <div className="pt-2 space-y-3">
                    <div className="flex items-center justify-between">
                       <p className="text-[10px] text-[#D4AF37] font-bold uppercase tracking-widest">Áudio e Mídia</p>
                       <div className="flex items-center gap-1">
                           <button 
                             onClick={() => setMusicEnabled(!musicEnabled)} 
                             className={`p-1.5 rounded-lg border transition-colors ${musicEnabled ? 'border-[#D4AF37] bg-[#D4AF37]/10 text-[#D4AF37]' : 'border-white/10 text-neutral-500'}`}
                             title="Música de Fundo"
                           >
                             {musicEnabled ? <Music size={14} /> : <VolumeX size={14} />}
                           </button>
                           <button 
                             onClick={() => setSfxEnabled(!sfxEnabled)} 
                             className={`p-1.5 rounded-lg border transition-colors ${sfxEnabled ? 'border-[#D4AF37] bg-[#D4AF37]/10 text-[#D4AF37]' : 'border-white/10 text-neutral-500'}`}
                             title="Efeitos Sonoros"
                           >
                             {sfxEnabled ? <Volume2 size={14} /> : <VolumeX size={14} />}
                           </button>
                       </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-2 bg-black/50 p-1 rounded-xl border border-white/5">
                      <button 
                        onClick={() => setBgMode('video')}
                        className={`py-2 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-2 ${bgMode === 'video' ? 'bg-white text-black' : 'text-neutral-500 hover:text-white'}`}
                      >
                        <Video size={14} /> VÍDEO
                      </button>
                      <button 
                        onClick={() => setBgMode('chroma')}
                        className={`py-2 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-2 ${bgMode === 'chroma' ? 'bg-[#00FF00] text-black' : 'text-neutral-500 hover:text-white'}`}
                      >
                        <ImageIcon size={14} /> CHROMA
                      </button>
                    </div>

                    <div className="mt-4 pt-2 space-y-2">
                      <input type="file" accept="video/*" multiple className="hidden" ref={fileInputRef} onChange={handleVideoUpload} />
                      <button 
                        onClick={() => fileInputRef.current.click()}
                        className={`w-full py-3 px-4 rounded-xl border text-xs font-bold flex flex-col items-center justify-center gap-1 transition-all ${localVideos.length > 0 ? 'border-[#D4AF37]/50 bg-[#D4AF37]/10 text-[#D4AF37]' : 'border-white/10 text-neutral-400 hover:bg-white/5'}`}
                      >
                        <div className="flex items-center gap-2">
                          {localVideos.length > 0 ? `${localVideos.length} VÍDEOS CARREGADOS ✓` : '1. CARREGAR VÍDEOS'}
                          <Video size={16} />
                        </div>
                        {localVideos.length === 0 && <span className="text-[9px] font-normal opacity-70">Recomendado: 3 a 5 vídeos</span>}
                      </button>

                      {/* GALERIA DE VÍDEOS */}
                      {localVideos.length > 0 && (
                        <div className="bg-black/30 border border-white/5 rounded-xl p-3 mt-2">
                          <div className="flex items-center justify-between mb-2">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase tracking-wider">Cenas</span>
                            {localVideos.length > 1 && (
                              <button 
                                onClick={() => setAutoCutEnabled(!autoCutEnabled)}
                                className={`text-[9px] px-2 py-1 rounded border flex items-center gap-1 transition-colors ${autoCutEnabled ? 'bg-[#D4AF37]/20 border-[#D4AF37]/50 text-[#D4AF37]' : 'border-white/20 text-neutral-500'}`}
                                title="Mudar vídeo automaticamente com o tempo"
                              >
                                <Scissors size={10} /> CORTE AUTO
                              </button>
                            )}
                          </div>
                          
                          <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar snap-x">
                            {localVideos.map((url, idx) => (
                              <button
                                key={idx}
                                onClick={() => { setCurrentVideoIndex(idx); setAutoCutEnabled(false); }}
                                className={`relative shrink-0 w-16 h-20 rounded-lg overflow-hidden border-2 snap-center transition-all duration-300 ${currentVideoIndex === idx ? 'border-[#D4AF37] scale-105 shadow-[0_0_10px_rgba(212,175,55,0.5)]' : 'border-transparent opacity-50 hover:opacity-100'}`}
                              >
                                <video src={url} className="w-full h-full object-cover pointer-events-none" muted preload="metadata" />
                                <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black to-transparent text-[9px] font-bold text-white text-center pt-4 pb-1">
                                  #{idx + 1}
                                </div>
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      <input type="file" accept="image/*" className="hidden" ref={logoInputRef} onChange={handleLogoUpload} />
                      <button 
                        onClick={() => logoInputRef.current.click()}
                        className={`w-full py-4 px-4 rounded-xl border text-xs font-bold flex items-center justify-between transition-all ${localLogoUrl ? 'border-[#D4AF37]/50 bg-[#D4AF37]/10 text-[#D4AF37]' : 'border-white/10 text-neutral-400 hover:bg-white/5'}`}
                      >
                        {localLogoUrl ? 'LOGO CARREGADA ✓' : '2. CARREGAR SUA LOGO'}
                        <Upload size={16} />
                      </button>
                    </div>
                  </div>

                  <div className="mt-auto space-y-4 pt-4 border-t border-white/5">
                    <button 
                      onClick={startRecordingMode}
                      className={`w-full py-4 rounded-2xl font-black text-sm shadow-xl transition-all flex flex-col items-center justify-center gap-1 bg-white text-black hover:scale-[1.02]`}
                    >
                      <div className="flex items-center gap-2">
                        <Video size={18} />
                        PREPARAR GRAVAÇÃO OBS
                      </div>
                    </button>
                  </div>
                </div>
              )}

              {/* ÁREA DE RENDERIZAÇÃO DOM */}
              <div className="flex-1 h-full flex items-center justify-center relative p-0 sm:p-8 bg-[#020202]">
                
                {countdown !== null && countdown > 0 && (
                  <div className="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-black/90 backdrop-blur-md">
                    <h2 className="text-4xl font-black text-[#D4AF37] mb-6 text-center leading-tight">
                      Ligue o gravador do OBS<br/>
                      <span className="text-white font-medium text-2xl">O anúncio inicia em:</span>
                    </h2>
                    <div className="text-9xl font-black text-white drop-shadow-[0_0_40px_rgba(212,175,55,0.6)] animate-pulse">
                      {countdown}
                    </div>
                  </div>
                )}
                
                {isRecordingMode && countdown === null && (
                  <button onClick={stopRecordingMode} className="absolute top-6 left-6 z-50 px-4 py-2 bg-red-600/20 border border-red-600/50 hover:bg-red-600 text-white text-xs font-bold rounded-full shadow-lg flex items-center gap-2 transition-all opacity-10 hover:opacity-100">
                    <Pause size={14} fill="currentColor" /> PARAR / SAIR
                  </button>
                )}

                {!isRecordingMode && (
                  <div className="absolute top-6 right-6 flex items-center gap-4 z-50 bg-black/40 backdrop-blur-md px-4 py-2 rounded-2xl border border-[#D4AF37]/20 hidden sm:flex">
                     <div className="flex flex-col items-end">
                       <span className="text-[9px] font-bold text-[#D4AF37] uppercase tracking-[0.2em] flex items-center gap-1">
                          <Clock size={10} /> Ad Time (48s Max)
                       </span>
                       <span ref={hudTimeRef} className="text-xl font-mono text-white tracking-widest leading-none mt-1">0.00s</span>
                     </div>
                  </div>
                )}

                {/* CONTAINER DO VÍDEO 9:16 */}
                <div 
                  className="relative overflow-hidden transition-all duration-500 flex items-center justify-center"
                  style={{ 
                    aspectRatio: '9/16', 
                    height: '100%',
                    maxHeight: isRecordingMode ? '100vh' : '88vh',
                    backgroundColor: bgMode === 'chroma' ? AC_COLORS.green : '#000',
                    borderRadius: isRecordingMode ? '0px' : '24px',
                    border: isRecordingMode ? 'none' : '1px solid rgba(212,175,55,0.2)',
                    boxShadow: isRecordingMode ? 'none' : '0 30px 60px -12px rgba(0, 0, 0, 0.9), 0 0 100px rgba(212,175,55,0.08)'
                  }}
                >
                  {bgMode === 'video' && (
                    <div className="absolute inset-0 w-full h-full bg-black z-0">
                      {currentLocalVideoUrl ? (
                        <video
                          ref={videoRef}
                          src={currentLocalVideoUrl}
                          crossOrigin="anonymous"
                          className="absolute inset-0 w-full h-full object-cover color-graded-video-ac origin-center"
                          style={{ transform: `scale(1.1) translateY(-2%)`, transition: 'transform 0.1s linear' }}
                          playsInline
                          preload="auto"
                          muted
                          loop
                          onLoadedData={() => {
                            if (isPlaying && videoRef.current) {
                                videoRef.current.play().catch(e => console.warn("Erro ao reproduzir novo vídeo:", e));
                            }
                          }}
                        />
                      ) : (
                         <div className="absolute inset-0 flex flex-col items-center justify-center text-[#D4AF37]/40 bg-neutral-900">
                           <ImageIcon size={48} className="mb-4 opacity-50" />
                           <p className="text-sm font-bold uppercase tracking-widest text-center px-4">Selecione vídeos (48s)<br/>na barra lateral</p>
                         </div>
                      )}
                      
                      {/* Flare Cinematográfico */}
                      <div className="warm-flare absolute inset-0 w-full h-full"></div>
                      <div className="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/80 pointer-events-none"></div>
                    </div>
                  )}

                  {/* LOGOTIPO NO TOPO */}
                  <div className="absolute top-12 left-1/2 -translate-x-1/2 flex flex-col items-center pointer-events-none z-10 w-[80%] max-w-[200px]">
                     {localLogoUrl ? (
                       <img src={localLogoUrl} alt="Logo" className="max-h-[100px] w-auto object-contain drop-shadow-[0_4px_15px_rgba(0,0,0,0.8)]" />
                     ) : (
                       <div className="flex flex-col items-center">
                         <span className="text-[46px] leading-none font-black text-white tracking-widest drop-shadow-2xl" style={{fontFamily: "'Playfair Display', serif"}}>AC</span>
                         <div className="flex items-center gap-2 mt-2">
                            <div className="w-6 h-[1px] bg-[#D4AF37]"></div>
                            <span className="text-[11px] leading-none text-[#D4AF37] font-bold uppercase tracking-[0.4em] drop-shadow-md">Estética</span>
                            <div className="w-6 h-[1px] bg-[#D4AF37]"></div>
                         </div>
                       </div>
                     )}
                  </div>

                  {/* LEGENDAS DINÂMICAS E PARTÍCULAS BOKEH */}
                  <div className="absolute bottom-32 left-0 right-0 px-5 z-20 pointer-events-none flex flex-col items-center">
                    {activeSubtitle && (
                      <div className="relative w-full flex justify-center pb-4">
                        
                        {/* Partículas Douradas Cinematográficas (Bokeh) */}
                        <div className="absolute inset-0 overflow-visible pointer-events-none opacity-80">
                           <div className="gold-dust w-2 h-2 left-[20%] top-[10%]" style={{animationDelay: '0.1s', animationDuration: '4s'}}></div>
                           <div className="gold-dust w-3 h-3 left-[80%] top-[30%]" style={{animationDelay: '0.5s', animationDuration: '5s'}}></div>
                           <div className="gold-dust w-1.5 h-1.5 left-[45%] top-[70%]" style={{animationDelay: '1.2s', animationDuration: '3.5s'}}></div>
                           <div className="gold-dust w-5 h-5 left-[65%] top-[85%] opacity-40 blur-[2px]" style={{animationDelay: '2s', animationDuration: '6s'}}></div>
                           <div className="gold-dust w-1 h-1 left-[15%] top-[55%]" style={{animationDelay: '0.8s', animationDuration: '4.5s'}}></div>
                           <div className="gold-dust w-4 h-4 left-[85%] top-[60%] blur-[1px] opacity-60" style={{animationDelay: '1.5s', animationDuration: '5.2s'}}></div>
                        </div>

                        {/* Text Container com Gap Menor e Layout Estável */}
                        <div className="relative flex flex-wrap justify-center items-center gap-x-2 gap-y-3 max-w-[95%] text-center z-10">
                          {activeSubtitle.text.split(' ').map((word, wordIdx) => {
                            // Limpeza rigorosa
                            const cleanWord = word.replace(/[.,!?:;]/g, '');
                            const isKeyword = highlightKeywords.some(kw => cleanWord.toLowerCase() === kw.toLowerCase().replace(/[.,!?:;]/g, ''));
                            
                            return (
                              <span key={`${activeSubtitle.id}-word-${wordIdx}`} className="whitespace-nowrap">
                                {isKeyword ? (
                                  word.split('').map((char, charIdx) => (
                                    <span 
                                      key={`char-${charIdx}`}
                                      className="letter-anim text-[36px] md:text-[44px] text-3d-gold"
                                      style={{ 
                                        animationDelay: `${(wordIdx * 0.06) + (charIdx * 0.03)}s, ${(wordIdx * 0.06) + (charIdx * 0.03) + 0.5}s, 0s`,
                                      }}
                                    >
                                      {char}
                                    </span>
                                  ))
                                ) : (
                                  <span 
                                    className="word-reveal-smooth"
                                    style={{ animationDelay: `${wordIdx * 0.1}s` }}
                                  >
                                    <span className="text-[17px] md:text-[20px] text-ig-pill inline-block">
                                      {word}
                                    </span>
                                  </span>
                                )}
                              </span>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Barra de Progresso Dourada Embaixo */}
                  <div className="absolute bottom-0 left-0 w-full h-1.5 bg-black/50 z-30 overflow-hidden">
                    <div ref={previewProgressBarRef} className="h-full bg-gradient-to-r from-[#CD7F32] via-[#FFF8DC] to-[#D4AF37] shadow-[0_0_20px_rgba(212,175,55,1)]" style={{ width: '0%', transition: 'width 0.1s linear' }}></div>
                  </div>

                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
